name: Build

on:
  push:
    branches:
      - 'main'
    paths:
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'test/**'
      - 'web/**'
      - 'go.*'
      - '*.md'

permissions:
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Get Latest Version
        id: latest
        uses: gregziegan/fetch-latest-release@v2.0.0
      - name: Calculate Next Version
        id: calculate
        uses: paulhatch/semantic-version@v5.3.0
        with:
          version_format: "${major}.${minor}.${patch}"
      - name: Determine Next Version
        if: ${{ contains(steps.latest.outputs.name, '.') }}
        id: version
        uses: haya14busa/action-cond@v1
        with:
          cond: ${{ contains(steps.latest.outputs.name, '.') }}
          if_true: ${{ steps.calculate.outputs.version }}
          if_false: '0.0.1'
      - name: Remove Leading "v" from Latest Version
        if: ${{ contains(steps.latest.outputs.name, '.') }}
        id: latest_clean
        run: |
          export version=$(echo ${{ steps.latest.outputs.name }} | sed 's/^v//')
          echo ::set-output name=name::$version
      - name: Update Version in Files (1)
        if: ${{ contains(steps.latest.outputs.name, '.') }}
        uses: datamonsters/replace-action@v2
        with:
          files: 'cmd/journal/main.go'
          replacements: '${{ steps.latest_clean.outputs.name }}=${{ steps.version.outputs.value }}'
      - name: Update Version in Files (2)
        if: ${{ contains(steps.latest.outputs.name, '.') }}
        uses: datamonsters/replace-action@v2
        with:
          files: 'web/app/package.json'
          replacements: '${{ steps.latest_clean.outputs.name }}=${{ steps.version.outputs.value }}'
      - name: Update Version in Files (3)
        if: ${{ contains(steps.latest.outputs.name, '.') }}
        uses: datamonsters/replace-action@v2
        with:
          files: 'api/openapi.yml'
          replacements: '${{ steps.latest_clean.outputs.name }}=${{ steps.version.outputs.value }}'
      - name: Generate Changelog
        if: ${{ contains(steps.latest.outputs.name, '.') }}
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --output CHANGELOG.md --tag ${{ steps.version.outputs.value }}
      - name: File Save Delay
        uses: jakejarvis/wait-action@master
        with:
          time: '2s'
      - name: Commit Version Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] Update version to v${{ steps.version.outputs.value }}"
      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker Login
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jamiefdhurst/journal:latest
            ghcr.io/jamiefdhurst/journal:${{ steps.version.outputs.value }}
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum
      - name: Build Binaries
        run: |
          go mod download
          GOOS=linux  GOARCH=amd64 go build -ldflags="-w -s" -o journal_linux_amd64-${{ steps.version.outputs.value }}   ./cmd/journal
          GOOS=linux  GOARCH=arm64 go build -ldflags="-w -s" -o journal_linux_arm64-${{ steps.version.outputs.value }}   ./cmd/journal
          GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s" -o journal_darwin_arm64-${{ steps.version.outputs.value }} ./cmd/journal
          GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s" -o journal_darwin_amd64-${{ steps.version.outputs.value }} ./cmd/journal
      - name: Generate Release Notes
        uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          config: cliff.toml
          args: --unreleased --strip header --latest
      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          tag: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          body: ${{ steps.cliff.outputs.changelog }}
          artifacts: "journal_linux_amd64-${{ steps.version.outputs.value }},journal_linux_arm64-${{ steps.version.outputs.value }},journal_darwin_arm64-${{ steps.version.outputs.value }},journal_darwin_amd64-${{ steps.version.outputs.value }}"
