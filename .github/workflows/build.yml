name: Build

on:
  push:
    branches:
      - 'main'
    paths:
      - 'api/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'test/**'
      - 'web/**'
      - 'go.*'
      - '*.md'

permissions:
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Calculate Next Version
        id: version
        run: |
          chmod +x .github/scripts/calculate-version.sh
          .github/scripts/calculate-version.sh
      - name: Update Version in Files
        if: steps.version.outputs.should_release == 'true'
        run: |
          OLD_VERSION=$(echo "${{ steps.version.outputs.previous_version }}" | sed 's/^v//')
          NEW_VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/${OLD_VERSION}/${NEW_VERSION}/g" cmd/journal/main.go
          sed -i "s/${OLD_VERSION}/${NEW_VERSION}/g" api/openapi.yml
      - name: Generate Changelog
        if: steps.version.outputs.should_release == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md --tag ${{ steps.version.outputs.version }}
      - name: File Save Delay
        if: steps.version.outputs.should_release == 'true'
        uses: jakejarvis/wait-action@master
        with:
          time: '2s'
      - name: Commit Version Changes
        if: steps.version.outputs.should_release == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "[skip ci] Update version to v${{ steps.version.outputs.version }}"
          file_pattern: "cmd/journal/main.go api/openapi.yml CHANGELOG.md"
      - name: Set Up QEMU
        if: steps.version.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v3
      - name: Set Up Docker Buildx
        if: steps.version.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Docker Login (GHCR)
        if: steps.version.outputs.should_release == 'true'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}
      - name: Docker Login (Docker Hub)
        if: steps.version.outputs.should_release == 'true'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        if: steps.version.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jamiefdhurst/journal:latest
            ghcr.io/jamiefdhurst/journal:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/journal:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/journal:${{ steps.version.outputs.version }}
      - name: Setup Go
        if: steps.version.outputs.should_release == 'true'
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum
      - name: Build Binaries
        if: steps.version.outputs.should_release == 'true'
        run: |
          go mod download
          GOOS=linux  GOARCH=amd64 go build -ldflags="-w -s" -o journal_linux_amd64-${{ steps.version.outputs.version }}   ./cmd/journal
          GOOS=linux  GOARCH=arm64 go build -ldflags="-w -s" -o journal_linux_arm64-${{ steps.version.outputs.version }}   ./cmd/journal
          GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s" -o journal_darwin_arm64-${{ steps.version.outputs.version }} ./cmd/journal
          GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s" -o journal_darwin_amd64-${{ steps.version.outputs.version }} ./cmd/journal
      - name: Bundle Release Archives
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for target in linux_amd64 linux_arm64 darwin_arm64 darwin_amd64; do
            os="${target%_*}"
            arch="${target#*_}"
            dir="journal-${VERSION}-${os}-${arch}"
            mkdir -p "${dir}/web"
            cp "journal_${os}_${arch}-${VERSION}" "${dir}/journal"
            chmod +x "${dir}/journal"
            cp -r web/static web/templates web/themes "${dir}/web/"
            tar -czf "${dir}.tar.gz" "${dir}/"
            rm -rf "${dir}"
          done
      - name: Install nfpm
        if: steps.version.outputs.should_release == 'true'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm
      - name: Build Packages
        if: steps.version.outputs.should_release == 'true'
        run: |
          export VERSION=${{ steps.version.outputs.version }}
          export ARCH=amd64
          envsubst < nfpm.yaml > nfpm_resolved.yaml
          nfpm pkg --config nfpm_resolved.yaml --packager deb --target journal_${VERSION}_amd64.deb
          nfpm pkg --config nfpm_resolved.yaml --packager rpm --target journal-${VERSION}-1.x86_64.rpm
          export ARCH=arm64
          envsubst < nfpm.yaml > nfpm_resolved.yaml
          nfpm pkg --config nfpm_resolved.yaml --packager deb --target journal_${VERSION}_arm64.deb
          nfpm pkg --config nfpm_resolved.yaml --packager rpm --target journal-${VERSION}-1.aarch64.rpm
      - name: Generate Release Notes
        if: steps.version.outputs.should_release == 'true'
        id: release_notes
        run: |
          chmod +x .github/scripts/release-notes.sh
          .github/scripts/release-notes.sh ${{ steps.version.outputs.version }}
      - name: Create Release
        if: steps.version.outputs.should_release == 'true'
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          tag: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          bodyFile: 'release_notes.md'
          artifacts: "journal_linux_amd64-${{ steps.version.outputs.version }},journal_linux_arm64-${{ steps.version.outputs.version }},journal_darwin_arm64-${{ steps.version.outputs.version }},journal_darwin_amd64-${{ steps.version.outputs.version }},journal-${{ steps.version.outputs.version }}-linux-amd64.tar.gz,journal-${{ steps.version.outputs.version }}-linux-arm64.tar.gz,journal-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz,journal-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz,journal_${{ steps.version.outputs.version }}_amd64.deb,journal_${{ steps.version.outputs.version }}_arm64.deb,journal-${{ steps.version.outputs.version }}-1.x86_64.rpm,journal-${{ steps.version.outputs.version }}-1.aarch64.rpm"
      - name: Update Homebrew Tap
        if: steps.version.outputs.should_release == 'true'
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: jamiefdhurst
          homebrew_tap: homebrew-journal
          formula_folder: Formula
          github_token: ${{ secrets.PAT }}
          commit_owner: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          install: |
            libexec.install "journal" => "journal-bin"
            libexec.install "web"
            (bin/"journal").write "#!/bin/sh\ncd \"#{libexec}\"\nexec \"#{libexec}/journal-bin\" \"$@\"\n"
          test: |
            output = shell_output("#{bin}/journal 2>&1", 1)
            assert_match "Journal v#{version}", output
          target_darwin_amd64: true
          target_darwin_arm64: true
          target_linux_amd64: false
          target_linux_arm64: false
      - name: Trigger Package Repository Update
        if: steps.version.outputs.should_release == 'true'
        run: |
          gh api repos/jamiefdhurst/packages/dispatches \
            --method POST \
            -f event_type=new-release \
            -f "client_payload[version]=${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.PAT }}
